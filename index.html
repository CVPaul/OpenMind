<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenMind</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OpenMind">
<link rel="apple-touch-icon" href="./icons/icon-192.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#04080f;min-height:100vh;overflow:hidden;
  font-family:'Microsoft YaHei','PingFang SC','Segoe UI',sans-serif;
  color:#e2e8f0;
}

/* ── Layout ── */
#app{display:flex;height:100vh;}
#canvas-wrap{flex:1;position:relative;overflow:hidden;}
#canvas{width:100%;height:100%;display:block;cursor:default;}

/* ── Toolbar ── */
#toolbar{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;align-items:center;
  background:rgba(9,22,38,.85);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;
  padding:6px 10px;z-index:10;
}
#toolbar .logo{
  font-size:13px;font-weight:800;letter-spacing:1px;
  color:#60a5fa;padding-right:8px;border-right:1px solid rgba(255,255,255,.1);
  margin-right:2px;
}
.tb-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:#94a3b8;font-size:11px;padding:4px 9px;border-radius:7px;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tb-btn:hover{background:rgba(255,255,255,.1);color:#e2e8f0;}
.tb-btn.active{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4);color:#93c5fd;}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.08);margin:0 2px;}

/* ── Sidebar (Agent) ── */
#sidebar{
  width:320px;min-width:280px;
  background:rgba(9,22,38,.95);border-left:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;
  transition:width .2s;
}
#sidebar.collapsed{width:0;min-width:0;overflow:hidden;}
#sidebar-header{
  padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
#sidebar-header h3{font-size:13px;font-weight:700;color:#93c5fd;letter-spacing:.5px;}
#cfg-btn{
  font-size:10px;color:#64748b;cursor:pointer;padding:3px 7px;
  border:1px solid rgba(255,255,255,.08);border-radius:5px;
  transition:color .15s;
}
#cfg-btn:hover{color:#94a3b8;}

/* ── Chat messages ── */
#messages{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:10px;
}
#messages::-webkit-scrollbar{width:4px;}
#messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.msg{max-width:94%;font-size:12px;line-height:1.6;padding:8px 11px;border-radius:9px;}
.msg.user{
  align-self:flex-end;
  background:rgba(37,99,235,.25);border:1px solid rgba(59,130,246,.25);color:#bfdbfe;
}
.msg.assistant{
  align-self:flex-start;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#cbd5e1;
}
.msg.error{
  align-self:flex-start;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;
}
.msg.system{
  align-self:center;font-size:10px;color:#475569;
  background:transparent;border:none;padding:2px 0;
}

/* ── Chat input ── */
#chat-input-wrap{
  padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
#chat-input{
  flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:7px 10px;color:#e2e8f0;font-size:12px;resize:none;
  font-family:inherit;outline:none;max-height:100px;line-height:1.5;
  transition:border-color .15s;
}
#chat-input:focus{border-color:rgba(59,130,246,.4);}
#send-btn{
  background:rgba(37,99,235,.7);border:1px solid rgba(59,130,246,.4);
  color:#bfdbfe;padding:7px 13px;border-radius:8px;cursor:pointer;
  font-size:12px;transition:all .15s;flex-shrink:0;
}
#send-btn:hover{background:rgba(37,99,235,.9);}
#send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── Config panel ── */
#cfg-panel{
  position:absolute;inset:0;background:rgba(4,8,15,.92);z-index:20;
  display:none;flex-direction:column;padding:20px;gap:12px;overflow-y:auto;
}
#cfg-panel.open{display:flex;}
#cfg-panel h4{font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:4px;}
.cfg-row{display:flex;flex-direction:column;gap:5px;}
.cfg-row label{font-size:11px;color:#64748b;}
.cfg-row select,.cfg-row input{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:#e2e8f0;padding:6px 9px;border-radius:7px;font-size:12px;
  font-family:inherit;outline:none;
}
.cfg-row input[type=password]{letter-spacing:2px;}
#cfg-save{
  margin-top:4px;padding:7px;border-radius:8px;
  background:rgba(37,99,235,.6);border:1px solid rgba(59,130,246,.4);
  color:#bfdbfe;cursor:pointer;font-size:12px;
}
#cfg-close{
  position:absolute;top:14px;right:14px;
  color:#475569;cursor:pointer;font-size:18px;line-height:1;
}
#cfg-close:hover{color:#94a3b8;}

/* ── Quick prompts ── */
#quick-prompts{padding:0 12px 8px;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}
.qp{
  font-size:10px;color:#475569;border:1px solid rgba(255,255,255,.06);
  padding:3px 8px;border-radius:5px;cursor:pointer;transition:all .15s;
}
.qp:hover{color:#94a3b8;border-color:rgba(255,255,255,.12);}

/* ── Status bar ── */
#statusbar{
  position:absolute;bottom:10px;left:12px;
  font-size:9px;color:rgba(255,255,255,.15);letter-spacing:1px;
  pointer-events:none;z-index:5;
}

/* ── Sidebar toggle ── */
#toggle-sidebar{
  position:absolute;top:50%;right:0;transform:translateY(-50%);
  width:18px;height:40px;background:rgba(9,22,38,.8);
  border:1px solid rgba(255,255,255,.08);border-right:none;
  border-radius:6px 0 0 6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#475569;font-size:10px;z-index:10;
  transition:color .15s;
}
#toggle-sidebar:hover{color:#94a3b8;}
</style>
</head>
<body>
<div id="app">
  <!-- Canvas -->
  <div id="canvas-wrap">
    <svg id="canvas"></svg>

    <!-- Toolbar -->
    <div id="toolbar">
      <span class="logo">OpenMind</span>
      <button class="tb-btn" id="btn-add-child" title="Tab">+ 子节点</button>
      <button class="tb-btn" id="btn-add-sibling" title="Enter">+ 兄弟</button>
      <button class="tb-btn" id="btn-delete" title="Delete">删除</button>
      <div class="tb-sep"></div>
      <button class="tb-btn active" id="btn-h" data-mode="horizontal">水平</button>
      <button class="tb-btn" id="btn-v" data-mode="vertical">垂直</button>
      <button class="tb-btn" id="btn-r" data-mode="radial">放射</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-fit" title="Ctrl+F">适应屏幕</button>
      <button class="tb-btn" id="btn-undo" title="Ctrl+Z">撤销</button>
      <button class="tb-btn" id="btn-redo" title="Ctrl+Y">重做</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-export-json">导出 JSON</button>
      <button class="tb-btn" id="btn-import-json">导入</button>
      <button class="tb-btn" id="btn-export-svg">SVG</button>
      <button class="tb-btn" id="btn-export-png">PNG</button>
    </div>

    <div id="statusbar">Tab 新增子节点 · Enter 新增兄弟 · Space 折叠 · Ctrl+Z 撤销 · 双击编辑</div>
    <div id="toggle-sidebar">◀</div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="cfg-panel">
      <span id="cfg-close">×</span>
      <h4>Agent 设置</h4>
      <div class="cfg-row">
        <label>API 提供商</label>
        <select id="cfg-provider">
          <option value="claude">Claude (Anthropic)</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>
      <div class="cfg-row">
        <label>API Key（存本地，不上传）</label>
        <input type="password" id="cfg-key" placeholder="sk-…">
      </div>
      <div class="cfg-row">
        <label>模型（留空使用默认）</label>
        <input type="text" id="cfg-model" placeholder="claude-sonnet-4-6 / gpt-4o">
      </div>
      <button id="cfg-save">保存</button>
    </div>

    <div id="sidebar-header">
      <h3>✦ AI 助手</h3>
      <span id="cfg-btn">设置</span>
    </div>

    <div id="quick-prompts">
      <span class="qp" data-q="帮我展开当前选中的节点，生成 3-5 个子主题">展开节点</span>
      <span class="qp" data-q="把这个导图精简一下，合并重复内容">精简导图</span>
      <span class="qp" data-q="帮我重新组织导图的结构，让逻辑更清晰">重组结构</span>
      <span class="qp" data-q="给每个节点补充一个简短说明作为子节点">补充说明</span>
    </div>

    <div id="messages">
      <div class="msg system">输入指令，AI 将直接修改导图</div>
    </div>

    <div id="chat-input-wrap">
      <textarea id="chat-input" rows="1" placeholder="告诉 AI 你想做什么…"></textarea>
      <button id="send-btn">发送</button>
    </div>
  </div>
</div>

<script type="module">
// ══════════════════════════════════════════════════════
//  model.js
// ══════════════════════════════════════════════════════
const NODES = new Map();
const EDGES = [];
let _idCounter = 0;
function genId(){ return 'n'+(++_idCounter).toString(36)+Math.random().toString(36).slice(2,5); }

function createNode(label, parentId=null, meta={}){
  const id=genId();
  NODES.set(id,{id,label,x:0,y:0,width:0,height:0,collapsed:false,parentId,meta:{color:null,note:'',...meta}});
  if(parentId) EDGES.push({source:parentId,target:id});
  return id;
}
function updateNode(id,patch){
  const n=NODES.get(id); if(!n) return;
  if(patch.meta) patch.meta={...n.meta,...patch.meta};
  Object.assign(n,patch);
}
function deleteNode(id){
  getSubtree(id).forEach(nid=>{
    NODES.delete(nid);
    for(let i=EDGES.length-1;i>=0;i--){
      const e=EDGES[i];
      if(e.source===nid||e.target===nid) EDGES.splice(i,1);
    }
  });
}
function getChildren(id){ return EDGES.filter(e=>e.source===id).map(e=>e.target); }
function getSubtree(id){
  const r=[],q=[id];
  while(q.length){const c=q.shift();r.push(c);q.push(...getChildren(c));}
  return r;
}
function getRootId(){
  const childIds=new Set(EDGES.map(e=>e.target));
  for(const id of NODES.keys()) if(!childIds.has(id)) return id;
  return NODES.keys().next().value??null;
}
function exportJSON(){
  return JSON.stringify({version:1,nodes:[...NODES.values()],edges:[...EDGES]},null,2);
}
function importJSON(json){
  const data=typeof json==='string'?JSON.parse(json):json;
  NODES.clear(); EDGES.length=0;
  (data.nodes||[]).forEach(n=>NODES.set(n.id,n));
  (data.edges||[]).forEach(e=>EDGES.push(e));
  let max=0;
  for(const id of NODES.keys()){const n=parseInt(id.slice(1),36);if(!isNaN(n)&&n>max)max=n;}
  _idCounter=max;
}
function initDefault(){
  const root=createNode('OpenMind');
  const a=createNode('轻量化',root);
  const b=createNode('智能化',root);
  const c=createNode('开源',root);
  createNode('单 HTML 可跑',a); createNode('无后端依赖',a);
  createNode('Agent 对话',b); createNode('Claude / OpenAI',b);
  createNode('MIT License',c); createNode('社区驱动',c);
  return root;
}

// ══════════════════════════════════════════════════════
//  layout.js
// ══════════════════════════════════════════════════════
const LEVEL_GAP=200, SIBLING_GAP=14, NODE_H=36;
function measureWidth(label){ return Math.max(80,label.length*8+24); }
function isCollapsed(id){ return NODES.get(id)?.collapsed??false; }

function initSizes(){
  for(const[,n]of NODES){
    n.width=measureWidth(n.label); n.height=NODE_H;
    n._prelim=0; n._modifier=0; n._ancestor=n; n._number=0;
  }
}
function firstWalk(id,siblings,index){
  const n=NODES.get(id); n._number=index;
  const children=isCollapsed(id)?[]:getChildren(id);
  if(!children.length){
    const ls=siblings[index-1];
    n._prelim=ls?NODES.get(ls)._prelim+sibDist(ls,id):0;
  } else {
    children.forEach((c,i)=>firstWalk(c,children,i));
    const mid=(NODES.get(children[0])._prelim+NODES.get(children[children.length-1])._prelim)/2;
    const ls=siblings[index-1];
    if(ls){
      n._prelim=NODES.get(ls)._prelim+sibDist(ls,id);
      n._modifier=n._prelim-mid;
    } else { n._prelim=mid; n._modifier=0; }
  }
}
function sibDist(a,b){ const l=NODES.get(a),r=NODES.get(b); return(l.height+r.height)/2+SIBLING_GAP; }
function secondWalk(id,modSum,depth){
  const n=NODES.get(id);
  n._y=n._prelim+modSum; n._x=depth*LEVEL_GAP;
  const children=isCollapsed(id)?[]:getChildren(id);
  children.forEach(c=>secondWalk(c,modSum+n._modifier,depth+1));
}
function layoutTree(rootId,mode='horizontal'){
  if(!rootId||!NODES.has(rootId)) rootId=getRootId();
  if(!rootId) return;
  initSizes();
  firstWalk(rootId,[rootId],0);
  secondWalk(rootId,0,0);
  const ry=NODES.get(rootId)._y;
  for(const[,n]of NODES) n._y-=ry;
  if(mode==='horizontal'){
    for(const[,n]of NODES){n.x=n._x;n.y=n._y;}
  } else if(mode==='vertical'){
    for(const[,n]of NODES){n.x=n._y;n.y=n._x;}
  } else {
    let maxY=1;
    for(const[,n]of NODES) if(Math.abs(n._y)>maxY) maxY=Math.abs(n._y);
    for(const[,n]of NODES){
      const angle=(n._y/maxY)*(Math.PI*0.8);
      n.x=n._x*Math.cos(angle); n.y=n._x*Math.sin(angle);
    }
  }
}

// ══════════════════════════════════════════════════════
//  render.js
// ══════════════════════════════════════════════════════
const SVG_NS='http://www.w3.org/2000/svg';
const PALETTE=['#3b82f6','#10b981','#f59e0b','#ef4444','#a855f7','#06b6d4','#f97316','#84cc16','#ec4899','#6366f1'];
let camera={x:0,y:0,scale:1};
let selectedId=null;
let layoutMode='horizontal';
let _svg,_viewport,_edgesLayer,_nodesLayer,_onSelect;

function initRenderer(svgEl,onSel){
  _svg=svgEl; _onSelect=onSel;
  _viewport=mkEl('g',{id:'viewport'});
  _edgesLayer=mkEl('g',{id:'edges-layer'});
  _nodesLayer=mkEl('g',{id:'nodes-layer'});
  _viewport.appendChild(_edgesLayer);
  _viewport.appendChild(_nodesLayer);
  _svg.appendChild(_viewport);
  bindCamera();
  updateViewport();
}

function isVisible(id){
  let cur=NODES.get(id); if(!cur) return false;
  let pid=cur.parentId;
  while(pid){const p=NODES.get(pid);if(!p)break;if(p.collapsed)return false;pid=p.parentId;}
  return true;
}

function nodeDepth(id){
  let d=0,cur=NODES.get(id);
  while(cur?.parentId){d++;cur=NODES.get(cur.parentId);}
  return d;
}
function nodeColor(node){
  if(node.meta?.color) return node.meta.color;
  const depth=nodeDepth(node.id);
  if(depth===0) return '#2563eb';
  let ancestor=node.id,cur=NODES.get(node.id);
  while(cur?.parentId&&NODES.get(cur.parentId)?.parentId){ancestor=cur.parentId;cur=NODES.get(cur.parentId);}
  const rootChildren=getChildren(cur.parentId||node.id);
  const idx=rootChildren.indexOf(ancestor);
  return PALETTE[Math.abs(idx)%PALETTE.length];
}

function render(rootId){
  if(!_svg) return;
  layoutTree(rootId||getRootId(),layoutMode);
  _edgesLayer.innerHTML=''; _nodesLayer.innerHTML='';
  for(const e of EDGES){
    const s=NODES.get(e.source),t=NODES.get(e.target);
    if(s&&t&&isVisible(e.source)&&isVisible(e.target)) _edgesLayer.appendChild(renderEdge(s,t));
  }
  for(const[id,node]of NODES){
    if(isVisible(id)) _nodesLayer.appendChild(renderNode(node));
  }
  updateViewport();
}

function renderNode(node){
  const g=mkEl('g',{class:'node-g',transform:`translate(${node.x},${node.y})`});
  g.dataset.id=node.id;
  const isRoot=!node.parentId, color=nodeColor(node);
  const w=node.width,h=node.height;
  const rect=mkEl('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:isRoot?10:6,
    fill:hexAlpha(color,isRoot?.18:.10),stroke:color,
    'stroke-width':isRoot?2:1.2,'stroke-opacity':isRoot?1:.6});
  const text=mkEl('text',{'text-anchor':'middle','dominant-baseline':'central',
    fill:isRoot?'#fff':lighten(color),'font-size':isRoot?14:12,'font-weight':isRoot?700:500,
    'font-family':"'Microsoft YaHei','PingFang SC','Segoe UI',sans-serif",'pointer-events':'none'});
  text.textContent=node.label;
  g.appendChild(rect); g.appendChild(text);
  const children=getChildren(node.id);
  if(children.length){
    const dot=mkEl('circle',{cx:w/2+8,cy:0,r:5,
      fill:node.collapsed?color:hexAlpha(color,.3),stroke:color,'stroke-width':1.2,cursor:'pointer'});
    dot.addEventListener('click',e=>{e.stopPropagation();toggleCollapse(node.id);});
    g.appendChild(dot);
  }
  if(node.id===selectedId){
    g.appendChild(mkEl('rect',{x:-w/2-3,y:-h/2-3,width:w+6,height:h+6,rx:isRoot?12:8,
      fill:'none',stroke:color,'stroke-width':2,'stroke-dasharray':'6,3','pointer-events':'none'}));
  }
  g.style.cursor='pointer';
  g.addEventListener('click',e=>{e.stopPropagation();selectNode(node.id);});
  g.addEventListener('dblclick',e=>{e.stopPropagation();startEdit(node.id);});
  bindDrag(g,node);
  return g;
}

function renderEdge(src,tgt){
  const hw=src.width/2;
  const right=tgt.x>src.x;
  const x1=src.x+(right?hw:-hw),y1=src.y;
  const x2=tgt.x-(right?tgt.width/2:-tgt.width/2),y2=tgt.y;
  const mx=(x1+x2)/2;
  return mkEl('path',{d:`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`,
    fill:'none',stroke:hexAlpha(nodeColor(tgt),.45),'stroke-width':1.4});
}

function toggleCollapse(id){
  const n=NODES.get(id); if(!n) return;
  n.collapsed=!n.collapsed; render();
}
function selectNode(id){ selectedId=id; if(_onSelect)_onSelect(id); render(); }
function clearSelection(){ selectedId=null; render(); }

let _editingId=null;
function startEdit(id){
  if(_editingId) commitEdit();
  _editingId=id;
  const node=NODES.get(id); if(!node) return;
  const existing=_nodesLayer.querySelector(`[data-id="${id}"]`);
  if(existing) existing.remove();
  const fo=mkEl('foreignObject',{x:node.x-node.width/2,y:node.y-node.height/2,
    width:node.width,height:node.height});
  fo.id='edit-fo';
  const input=document.createElement('input');
  input.value=node.label;
  input.style.cssText='width:100%;height:100%;border:none;outline:none;background:rgba(37,99,235,.15);'+
    'color:#fff;font-size:12px;font-weight:500;text-align:center;'+
    "font-family:'Microsoft YaHei','PingFang SC','Segoe UI',sans-serif;border-radius:6px;";
  input.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key==='Escape'){e.preventDefault();commitEdit(input.value);}});
  input.addEventListener('blur',()=>commitEdit(input.value));
  fo.appendChild(input); _nodesLayer.appendChild(fo);
  setTimeout(()=>{input.focus();input.select();},20);
}
function commitEdit(value){
  if(!_editingId) return;
  const id=_editingId; _editingId=null;
  const fo=document.getElementById('edit-fo'); if(fo) fo.remove();
  if(value!==undefined&&value.trim()){
    const n=NODES.get(id);
    n.label=value.trim(); n.width=Math.max(80,value.trim().length*8+24);
  }
  render(); scheduleSave();
}

function updateViewport(){
  if(!_viewport) return;
  _viewport.setAttribute('transform',`translate(${camera.x},${camera.y}) scale(${camera.scale})`);
}
function bindCamera(){
  let panning=false,lx=0,ly=0;
  _svg.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.1:.91;
    const rect=_svg.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    camera.x=mx-(mx-camera.x)*f; camera.y=my-(my-camera.y)*f;
    camera.scale=Math.min(3,Math.max(.2,camera.scale*f));
    updateViewport();
  },{passive:false});
  _svg.addEventListener('pointerdown',e=>{
    if(e.target===_svg||e.target===_viewport||e.target===_edgesLayer||e.target.tagName==='path'){
      panning=true;lx=e.clientX;ly=e.clientY;_svg.setPointerCapture(e.pointerId);clearSelection();
    }
  });
  _svg.addEventListener('pointermove',e=>{
    if(!panning) return;
    camera.x+=e.clientX-lx; camera.y+=e.clientY-ly;
    lx=e.clientX;ly=e.clientY; updateViewport();
  });
  _svg.addEventListener('pointerup',()=>{panning=false;});
}
function bindDrag(g,node){
  let dragging=false,sx=0,sy=0,ox=0,oy=0;
  g.addEventListener('pointerdown',e=>{
    if(e.target.tagName==='circle') return;
    dragging=true;sx=e.clientX;sy=e.clientY;ox=node.x;oy=node.y;
    g.setPointerCapture(e.pointerId);e.stopPropagation();
  });
  g.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const dx=(e.clientX-sx)/camera.scale,dy=(e.clientY-sy)/camera.scale;
    if(Math.abs(dx)>3||Math.abs(dy)>3){
      node.x=ox+dx;node.y=oy+dy;
      g.setAttribute('transform',`translate(${node.x},${node.y})`);
      _edgesLayer.innerHTML='';
      for(const edge of EDGES){const s=NODES.get(edge.source),t=NODES.get(edge.target);if(s&&t)_edgesLayer.appendChild(renderEdge(s,t));}
    }
  });
  g.addEventListener('pointerup',()=>{dragging=false;});
}
function fitToScreen(){
  if(!_svg||!NODES.size) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const[,n]of NODES){
    minX=Math.min(minX,n.x-n.width/2);minY=Math.min(minY,n.y-n.height/2);
    maxX=Math.max(maxX,n.x+n.width/2);maxY=Math.max(maxY,n.y+n.height/2);
  }
  const W=_svg.clientWidth,H=_svg.clientHeight;
  const mw=maxX-minX+80,mh=maxY-minY+80;
  camera.scale=Math.min(3,Math.max(.2,Math.min(W/mw,H/mh)));
  camera.x=W/2-(minX+mw/2-40)*camera.scale;
  camera.y=H/2-(minY+mh/2-40)*camera.scale;
  updateViewport();
}
function mkEl(tag,attrs={}){
  const el=document.createElementNS(SVG_NS,tag);
  for(const[k,v]of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}
function lighten(hex){
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+60);
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+60);
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+60);
  return`rgb(${r},${g},${b})`;
}

// ══════════════════════════════════════════════════════
//  editor.js (undo + keyboard)
// ══════════════════════════════════════════════════════
const _undoStack=[];
let _undoPtr=-1;
function snapshot(){
  _undoStack.splice(_undoPtr+1);
  _undoStack.push(exportJSON());
  if(_undoStack.length>50)_undoStack.shift();
  _undoPtr=_undoStack.length-1;
}
function undo(){
  if(_undoPtr<=0) return;
  _undoPtr--;importJSON(_undoStack[_undoPtr]);render(getRootId());
}
function redo(){
  if(_undoPtr>=_undoStack.length-1) return;
  _undoPtr++;importJSON(_undoStack[_undoPtr]);render(getRootId());
}
function addChild(parentId){
  if(!parentId) return; snapshot();
  const p=NODES.get(parentId); if(p?.collapsed) p.collapsed=false;
  const id=createNode('新节点',parentId);
  render(getRootId()); selectNode(id);
  setTimeout(()=>startEdit(id),50);
}
function addSibling(id){
  if(!id) return;
  const n=NODES.get(id);
  if(!n?.parentId){addChild(id);return;}
  snapshot();
  const newId=createNode('新节点',n.parentId);
  render(getRootId()); selectNode(newId);
  setTimeout(()=>startEdit(newId),50);
}
function removeNode(id){
  if(!id) return;
  const n=NODES.get(id); if(!n?.parentId) return;
  snapshot(); const pid=n.parentId; deleteNode(id);
  render(getRootId()); selectNode(pid);
}
function getVisibleChildren(id){
  const n=NODES.get(id); if(!n||n.collapsed) return [];
  return EDGES.filter(e=>e.source===id).map(e=>e.target).filter(t=>NODES.has(t));
}
function navigateByArrow(currentId,key){
  if(!currentId){selectNode(getRootId());return;}
  const node=NODES.get(currentId); if(!node) return;
  if(key==='ArrowRight'){const c=getVisibleChildren(currentId);if(c.length)selectNode(c[0]);}
  else if(key==='ArrowLeft'){if(node.parentId)selectNode(node.parentId);}
  else{
    if(!node.parentId) return;
    const siblings=getVisibleChildren(node.parentId);
    const idx=siblings.indexOf(currentId);
    const next=key==='ArrowUp'?siblings[idx-1]:siblings[idx+1];
    if(next) selectNode(next);
  }
}
function initKeyboard(){
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    const sel=selectedId;
    if(e.key==='Tab'){e.preventDefault();addChild(sel);}
    else if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addSibling(sel);}
    else if((e.key==='Delete'||e.key==='Backspace')&&sel){e.preventDefault();removeNode(sel);}
    else if(e.key===' '&&sel){e.preventDefault();toggleCollapse(sel);}
    else if(e.key==='F2'&&sel){e.preventDefault();startEdit(sel);}
    else if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
    else if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
    else if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();fitToScreen();}
    else if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();navigateByArrow(sel,e.key);}
  });
}

// ══════════════════════════════════════════════════════
//  persist.js
// ══════════════════════════════════════════════════════
const LS_KEY='openmind_map';
let _saveTimer=null;
function scheduleSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{try{localStorage.setItem(LS_KEY,exportJSON());}catch(_){}},500);
}
function loadFromStorage(){
  try{const raw=localStorage.getItem(LS_KEY);if(raw){importJSON(raw);return true;}}catch(_){}
  return false;
}
function downloadJSON(){
  const blob=new Blob([exportJSON()],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='mindmap.json';a.click();URL.revokeObjectURL(url);
}
function uploadJSON(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.addEventListener('change',async()=>{
    const file=input.files[0];if(!file)return;
    try{importJSON(await file.text());render(getRootId());scheduleSave();}
    catch(err){alert('文件格式错误：'+err.message);}
  });
  input.click();
}
function downloadSVG(){
  const svgEl=document.getElementById('canvas');if(!svgEl)return;
  const clone=svgEl.cloneNode(true);
  const style=document.createElementNS(SVG_NS,'style');
  style.textContent="text{font-family:'Microsoft YaHei',sans-serif;}";
  clone.insertBefore(style,clone.firstChild);
  const blob=new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='mindmap.svg';a.click();URL.revokeObjectURL(url);
}
function downloadPNG(){
  const svgEl=document.getElementById('canvas');if(!svgEl)return;
  const W=svgEl.clientWidth,H=svgEl.clientHeight;
  const blob=new Blob([new XMLSerializer().serializeToString(svgEl)],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=W*2;c.height=H*2;
    const ctx=c.getContext('2d');ctx.scale(2,2);
    ctx.fillStyle='#04080f';ctx.fillRect(0,0,W,H);ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='mindmap.png';a.click();},'image/png');
  };
  img.src=url;
}

// ══════════════════════════════════════════════════════
//  agent.js
// ══════════════════════════════════════════════════════
const CFG_KEY='openmind_agent_cfg';
function loadConfig(){try{return JSON.parse(localStorage.getItem(CFG_KEY)||'{}');}catch{return {};}}
function saveConfig(cfg){localStorage.setItem(CFG_KEY,JSON.stringify(cfg));}
const _chatHistory=[];

function buildSystemPrompt(){
  return`You are a mind map assistant embedded in OpenMind.
Current mind map JSON:
${exportJSON()}

Respond with ONLY a valid JSON object — no markdown fences, no explanation.
Schema:
{ "action": "replace"|"append"|"patch",
  "nodes": [{"id":string,"label":string,"parentId":string|null,"meta":{}}],
  "edges": [{"source":string,"target":string}] }

- "replace": clear all data, use provided nodes/edges.
- "append": add to existing map (use unique ids like "na1","na2"…).
- "patch": update labels/meta of existing nodes by id only.
Rules: labels ≤ 20 chars preferred; every non-root node must appear as edge target.`;
}

async function callClaude(cfg){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':cfg.apiKey,
      'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:cfg.model||'claude-sonnet-4-6',max_tokens:4096,
      system:buildSystemPrompt(),messages:_chatHistory}),
  });
  if(!resp.ok)throw new Error(`Claude ${resp.status}: ${await resp.text()}`);
  return(await resp.json()).content[0].text;
}
async function callOpenAI(cfg){
  const resp=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.apiKey}`},
    body:JSON.stringify({model:cfg.model||'gpt-4o',response_format:{type:'json_object'},
      messages:[{role:'system',content:buildSystemPrompt()},..._chatHistory]}),
  });
  if(!resp.ok)throw new Error(`OpenAI ${resp.status}: ${await resp.text()}`);
  return(await resp.json()).choices[0].message.content;
}
function applyPatch(patch){
  if(!patch?.action)throw new Error('Invalid patch');
  snapshot();
  if(patch.action==='replace'){
    NODES.clear();EDGES.length=0;
    (patch.nodes||[]).forEach(n=>NODES.set(n.id,{id:n.id,label:n.label,x:0,y:0,width:0,height:0,collapsed:false,parentId:n.parentId??null,meta:n.meta||{}}));
    (patch.edges||[]).forEach(e=>EDGES.push(e));
  } else if(patch.action==='append'){
    (patch.nodes||[]).forEach(n=>NODES.set(n.id,{id:n.id,label:n.label,x:0,y:0,width:0,height:0,collapsed:false,parentId:n.parentId??null,meta:n.meta||{}}));
    (patch.edges||[]).forEach(e=>EDGES.push(e));
  } else if(patch.action==='patch'){
    (patch.nodes||[]).forEach(n=>{const ex=NODES.get(n.id);if(ex){if(n.label)ex.label=n.label;if(n.meta)Object.assign(ex.meta,n.meta);}});
  }
  render(getRootId()); scheduleSave();
}
async function agentChat(userMsg){
  const cfg=loadConfig();
  if(!cfg.apiKey) throw new Error('请先在设置面板填写 API Key');
  _chatHistory.push({role:'user',content:userMsg});
  let raw;
  if(cfg.provider==='openai') raw=await callOpenAI(cfg);
  else raw=await callClaude(cfg);
  _chatHistory.push({role:'assistant',content:raw});
  const cleaned=raw.replace(/^```[a-z]*\n?/m,'').replace(/```$/m,'').trim();
  applyPatch(JSON.parse(cleaned));
  return raw;
}

// Chat
function addMsg(role,text){
  const div=document.createElement('div');
  div.className='msg '+role;
  div.textContent=text;
  const msgs=document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}
async function sendMessage(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim(); if(!msg) return;
  input.value=''; input.style.height='';
  addMsg('user',msg);
  const btn=document.getElementById('send-btn');
  btn.disabled=true; btn.textContent='…';
  try{
    await agentChat(msg);
    addMsg('assistant','导图已更新');
    setTimeout(fitToScreen,100);
  } catch(err){
    addMsg('error',err.message);
  } finally{
    btn.disabled=false; btn.textContent='发送';
  }
}
document.getElementById('send-btn').onclick=sendMessage;
document.getElementById('chat-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
document.getElementById('chat-input').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
});

// Quick prompts
document.querySelectorAll('.qp').forEach(qp=>{
  qp.onclick=()=>{
    document.getElementById('chat-input').value=qp.dataset.q;
    sendMessage();
  };
});

// Auto-save on any mutation
new MutationObserver(()=>scheduleSave()).observe(document.getElementById('canvas'),{subtree:true,childList:true});

// ── PWA: register service worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
