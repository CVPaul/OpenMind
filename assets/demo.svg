<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }

      /* ── fade-in helpers ── */
      .fade { opacity: 0; }

      /* Step 0: bg always visible */

      /* Step 1: root node */
      .s1 { animation: fadeIn .4s 0.3s forwards; }
      /* Step 2: 3 branch nodes */
      .s2a { animation: fadeIn .35s 1.0s forwards; }
      .s2b { animation: fadeIn .35s 1.3s forwards; }
      .s2c { animation: fadeIn .35s 1.6s forwards; }
      /* Step 3: lines root→branch */
      .l2a { animation: drawLine .4s 1.0s forwards; stroke-dashoffset: 300; }
      .l2b { animation: drawLine .4s 1.3s forwards; stroke-dashoffset: 300; }
      .l2c { animation: drawLine .4s 1.6s forwards; stroke-dashoffset: 300; }
      /* Step 4: leaf nodes */
      .s3a1 { animation: fadeIn .3s 2.1s forwards; }
      .s3a2 { animation: fadeIn .3s 2.3s forwards; }
      .s3b1 { animation: fadeIn .3s 2.5s forwards; }
      .s3b2 { animation: fadeIn .3s 2.7s forwards; }
      .s3c1 { animation: fadeIn .3s 2.9s forwards; }
      .s3c2 { animation: fadeIn .3s 3.1s forwards; }
      /* leaf lines */
      .ll3a1 { animation: drawLine .3s 2.1s forwards; stroke-dashoffset: 200; }
      .ll3a2 { animation: drawLine .3s 2.3s forwards; stroke-dashoffset: 200; }
      .ll3b1 { animation: drawLine .3s 2.5s forwards; stroke-dashoffset: 200; }
      .ll3b2 { animation: drawLine .3s 2.7s forwards; stroke-dashoffset: 200; }
      .ll3c1 { animation: drawLine .3s 2.9s forwards; stroke-dashoffset: 200; }
      .ll3c2 { animation: drawLine .3s 3.1s forwards; stroke-dashoffset: 200; }
      /* Step 5: AI chat bubble */
      .chat1 { animation: fadeIn .4s 3.8s forwards; }
      .chat2 { animation: fadeIn .4s 4.4s forwards; }
      .chat3 { animation: fadeIn .4s 5.0s forwards; }
      /* Step 6: new nodes from AI */
      .ai1 { animation: popIn .4s 5.6s forwards; }
      .ai2 { animation: popIn .4s 5.9s forwards; }
      .ai3 { animation: popIn .4s 6.2s forwards; }
      .lai1 { animation: drawLine .3s 5.6s forwards; stroke-dashoffset: 200; }
      .lai2 { animation: drawLine .3s 5.9s forwards; stroke-dashoffset: 200; }
      .lai3 { animation: drawLine .3s 6.2s forwards; stroke-dashoffset: 200; }

      @keyframes fadeIn {
        from { opacity: 0; transform-origin: center; transform: scale(0.85); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes popIn {
        0%   { opacity: 0; transform-origin: left center; transform: scale(0) translateX(-20px); }
        60%  { opacity: 1; transform: scale(1.08) translateX(2px); }
        100% { opacity: 1; transform: scale(1) translateX(0); }
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
      @keyframes blink {
        0%,100% { opacity: 1; } 50% { opacity: 0; }
      }
      .cursor { animation: blink 1s 3.5s 3 forwards; }
    </style>

    <!-- glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="900" height="500" fill="#04080f"/>
  <rect width="900" height="500" fill="url(#grid)" opacity="0.03"/>

  <!-- subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40,0 L0,0 0,40" fill="none" stroke="#fff" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="500" fill="url(#grid)" opacity="0.04"/>

  <!-- ── Toolbar ── -->
  <rect x="0" y="0" width="900" height="38" fill="#070f1c" rx="0"/>
  <rect x="12" y="10" width="70" height="18" rx="4" fill="#1e3a6e"/>
  <text x="47" y="23" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">OpenMind</text>
  <rect x="90" y="10" width="62" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="121" y="23" text-anchor="middle" fill="#64748b" font-size="9">+ 子节点 Tab</text>
  <rect x="158" y="10" width="52" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="184" y="23" text-anchor="middle" fill="#64748b" font-size="9">水平 ●</text>
  <rect x="215" y="10" width="42" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="236" y="23" text-anchor="middle" fill="#64748b" font-size="9">垂直</text>
  <rect x="263" y="10" width="42" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="284" y="23" text-anchor="middle" fill="#64748b" font-size="9">放射</text>

  <!-- ── Sidebar panel ── -->
  <rect x="660" y="38" width="240" height="462" fill="#070f1c" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <rect x="660" y="38" width="240" height="40" fill="#091626"/>
  <text x="680" y="64" fill="#93c5fd" font-size="12" font-weight="700">✦ AI 助手</text>
  <text x="858" y="64" text-anchor="end" fill="#475569" font-size="10">设置</text>

  <!-- quick prompts -->
  <rect x="672" y="88" width="62" height="16" rx="4" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <text x="703" y="100" text-anchor="middle" fill="#475569" font-size="8">展开节点</text>
  <rect x="740" y="88" width="62" height="16" rx="4" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <text x="771" y="100" text-anchor="middle" fill="#475569" font-size="8">精简导图</text>
  <rect x="808" y="88" width="62" height="16" rx="4" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <text x="839" y="100" text-anchor="middle" fill="#475569" font-size="8">重组结构</text>

  <!-- chat messages -->
  <g class="fade chat1">
    <rect x="672" y="118" width="200" height="38" rx="7" fill="rgba(37,99,235,.22)" stroke="rgba(59,130,246,.25)" stroke-width="1"/>
    <text x="682" y="132" fill="#bfdbfe" font-size="9">帮我展开「商业模式」节点，</text>
    <text x="682" y="146" fill="#bfdbfe" font-size="9">生成 3 个子主题</text>
  </g>
  <g class="fade chat2">
    <rect x="672" y="164" width="190" height="52" rx="7" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    <text x="682" y="178" fill="#94a3b8" font-size="9">好的，我为「商业模式」节点</text>
    <text x="682" y="191" fill="#94a3b8" font-size="9">新增了 3 个子主题：</text>
    <text x="682" y="204" fill="#10b981" font-size="9">✓ 订阅制 · 广告变现 · 企业授权</text>
  </g>
  <g class="fade chat3">
    <rect x="672" y="460" width="216" height="28" rx="7" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <text x="682" y="478" fill="#475569" font-size="9">输入指令，AI 直接修改导图…</text>
    <rect x="856" y="462" width="24" height="24" rx="5" fill="rgba(37,99,235,.6)"/>
    <text x="868" y="478" text-anchor="middle" fill="#bfdbfe" font-size="10">↑</text>
  </g>

  <!-- ══ MIND MAP AREA ══ -->

  <!-- Root node -->
  <g class="fade s1" filter="url(#glow)">
    <rect x="260" y="218" width="110" height="38" rx="10" fill="rgba(37,99,235,.22)" stroke="#2563eb" stroke-width="2"/>
    <text x="315" y="241" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">商业计划</text>
  </g>

  <!-- Branch A: 产品 -->
  <path class="fade l2a" d="M370,237 C420,237 430,160 480,160" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="300" opacity="0.6"/>
  <g class="fade s2a">
    <rect x="480" y="142" width="80" height="30" rx="7" fill="rgba(59,130,246,.12)" stroke="#3b82f6" stroke-width="1.2" stroke-opacity=".7"/>
    <text x="520" y="162" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">产品</text>
  </g>

  <!-- Branch B: 用户 -->
  <path class="fade l2b" d="M370,237 C430,237 430,237 480,237" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="300" opacity="0.6"/>
  <g class="fade s2b">
    <rect x="480" y="222" width="80" height="30" rx="7" fill="rgba(16,185,129,.12)" stroke="#10b981" stroke-width="1.2" stroke-opacity=".7"/>
    <text x="520" y="242" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">用户</text>
  </g>

  <!-- Branch C: 商业模式 -->
  <path class="fade l2c" d="M370,237 C420,237 430,315 480,315" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="300" opacity="0.6"/>
  <g class="fade s2c">
    <rect x="480" y="300" width="80" height="30" rx="7" fill="rgba(245,158,11,.12)" stroke="#f59e0b" stroke-width="1.2" stroke-opacity=".7"/>
    <text x="520" y="320" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">商业模式</text>
  </g>

  <!-- Leaf A -->
  <path class="fade ll3a1" d="M560,157 C590,157 595,135 620,135" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="200" opacity="0.45"/>
  <g class="fade s3a1">
    <rect x="620" y="122" width="86" height="24" rx="5" fill="rgba(59,130,246,.09)" stroke="#3b82f6" stroke-width="1" stroke-opacity=".5"/>
    <text x="663" y="138" text-anchor="middle" fill="#93c5fd" font-size="10">Web 优先</text>
  </g>
  <path class="fade ll3a2" d="M560,157 C590,157 595,175 620,175" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="200" opacity="0.45"/>
  <g class="fade s3a2">
    <rect x="620" y="162" width="86" height="24" rx="5" fill="rgba(59,130,246,.09)" stroke="#3b82f6" stroke-width="1" stroke-opacity=".5"/>
    <text x="663" y="178" text-anchor="middle" fill="#93c5fd" font-size="10">AI 自动生成 UI</text>
  </g>

  <!-- Leaf B -->
  <path class="fade ll3b1" d="M560,237 C590,237 595,215 620,215" fill="none" stroke="#10b981" stroke-width="1.2" stroke-dasharray="200" opacity="0.45"/>
  <g class="fade s3b1">
    <rect x="620" y="202" width="86" height="24" rx="5" fill="rgba(16,185,129,.09)" stroke="#10b981" stroke-width="1" stroke-opacity=".5"/>
    <text x="663" y="218" text-anchor="middle" fill="#6ee7b7" font-size="10">独立开发者</text>
  </g>
  <path class="fade ll3b2" d="M560,237 C590,237 595,258 620,258" fill="none" stroke="#10b981" stroke-width="1.2" stroke-dasharray="200" opacity="0.45"/>
  <g class="fade s3b2">
    <rect x="620" y="245" width="86" height="24" rx="5" fill="rgba(16,185,129,.09)" stroke="#10b981" stroke-width="1" stroke-opacity=".5"/>
    <text x="663" y="261" text-anchor="middle" fill="#6ee7b7" font-size="10">小型团队</text>
  </g>

  <!-- Leaf C (AI generated) -->
  <path class="fade ll3c1" d="M560,315 C590,315 595,293 620,293" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="200" opacity="0.45"/>
  <g class="fade s3c1">
    <rect x="620" y="280" width="86" height="24" rx="5" fill="rgba(245,158,11,.09)" stroke="#f59e0b" stroke-width="1" stroke-opacity=".5"/>
    <text x="663" y="296" text-anchor="middle" fill="#fcd34d" font-size="10">订阅制</text>
  </g>
  <path class="fade ll3c2" d="M560,315 C590,315 595,335 620,335" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="200" opacity="0.45"/>
  <g class="fade s3c2">
    <rect x="620" y="322" width="86" height="24" rx="5" fill="rgba(245,158,11,.09)" stroke="#f59e0b" stroke-width="1" stroke-opacity=".5"/>
    <text x="663" y="338" text-anchor="middle" fill="#fcd34d" font-size="10">企业授权</text>
  </g>

  <!-- AI generated nodes (pop in after chat) -->
  <path class="fade lai1" d="M560,315 C585,315 590,358 620,358" fill="none" stroke="rgba(245,158,11,.7)" stroke-width="1.4" stroke-dasharray="200" opacity="0.6"/>
  <g class="fade ai1" filter="url(#glow)">
    <rect x="620" y="345" width="86" height="24" rx="5" fill="rgba(245,158,11,.18)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="663" y="361" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">✨ 广告变现</text>
  </g>
  <path class="fade lai2" d="M560,315 C585,315 590,393 620,390" fill="none" stroke="rgba(245,158,11,.7)" stroke-width="1.4" stroke-dasharray="200" opacity="0.6"/>
  <g class="fade ai2" filter="url(#glow)">
    <rect x="620" y="377" width="86" height="24" rx="5" fill="rgba(245,158,11,.18)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="663" y="393" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">✨ 数据服务</text>
  </g>

  <!-- ── Branding watermark ── -->
  <text x="450" y="490" text-anchor="middle" fill="rgba(255,255,255,.08)" font-size="9" letter-spacing="3">OPENMIND · AI MIND MAP</text>
</svg>
