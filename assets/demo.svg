<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      text { font-family: 'Inter','Microsoft YaHei','PingFang SC',sans-serif; }
      .fade { opacity: 0; }

      /* node / line animations */
      .s1   { animation: fadeIn  .4s  0.3s  forwards; }
      .s2a  { animation: fadeIn  .35s 1.0s  forwards; }
      .s2b  { animation: fadeIn  .35s 1.4s  forwards; }
      .s2c  { animation: fadeIn  .35s 1.8s  forwards; }
      .l2a  { animation: drawL   .45s 0.9s  forwards; stroke-dashoffset:1000; }
      .l2b  { animation: drawL   .45s 1.3s  forwards; stroke-dashoffset:1000; }
      .l2c  { animation: drawL   .45s 1.7s  forwards; stroke-dashoffset:1000; }

      .s3a1 { animation: fadeIn  .3s  2.2s  forwards; }
      .s3a2 { animation: fadeIn  .3s  2.45s forwards; }
      .s3b1 { animation: fadeIn  .3s  2.7s  forwards; }
      .s3b2 { animation: fadeIn  .3s  2.95s forwards; }
      .s3c1 { animation: fadeIn  .3s  3.2s  forwards; }
      .s3c2 { animation: fadeIn  .3s  3.45s forwards; }
      .ll3a1{ animation: drawL   .3s  2.2s  forwards; stroke-dashoffset:1000; }
      .ll3a2{ animation: drawL   .3s  2.45s forwards; stroke-dashoffset:1000; }
      .ll3b1{ animation: drawL   .3s  2.7s  forwards; stroke-dashoffset:1000; }
      .ll3b2{ animation: drawL   .3s  2.95s forwards; stroke-dashoffset:1000; }
      .ll3c1{ animation: drawL   .3s  3.2s  forwards; stroke-dashoffset:1000; }
      .ll3c2{ animation: drawL   .3s  3.45s forwards; stroke-dashoffset:1000; }

      /* collapse dots appear with their parent node */
      .dot2a { animation: fadeIn .35s 1.0s forwards; }
      .dot2b { animation: fadeIn .35s 1.4s forwards; }
      .dot2c { animation: fadeIn .35s 1.8s forwards; }

      /* AI chat */
      .chat1 { animation: fadeIn .4s 4.2s forwards; }
      .chat2 { animation: fadeIn .4s 4.9s forwards; }

      /* AI generated nodes */
      .ai1  { animation: popIn   .45s 5.6s forwards; }
      .ai2  { animation: popIn   .45s 5.95s forwards; }
      .lai1 { animation: drawL   .35s 5.6s  forwards; stroke-dashoffset:1000; }
      .lai2 { animation: drawL   .35s 5.95s forwards; stroke-dashoffset:1000; }

      @keyframes fadeIn {
        from { opacity:0; transform:scale(.88); }
        to   { opacity:1; transform:scale(1); }
      }
      @keyframes popIn {
        0%   { opacity:0; transform:scale(0) translateX(-10px); }
        65%  { opacity:1; transform:scale(1.1); }
        100% { opacity:1; transform:scale(1); }
      }
      @keyframes drawL {
        from { stroke-dashoffset:1000; }
        to   { stroke-dashoffset:0; }
      }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ Background ══ -->
  <rect width="900" height="500" fill="#04080f"/>
  <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
    <path d="M36,0 L0,0 0,36" fill="none" stroke="#ffffff" stroke-width="0.4"/>
  </pattern>
  <rect width="900" height="500" fill="url(#grid)" opacity="0.035"/>

  <!-- ══ Toolbar ══ -->
  <rect x="0" y="0" width="900" height="36" fill="#070f1c"/>
  <rect x="10" y="9" width="68" height="18" rx="4" fill="#1e3a6e"/>
  <text x="44" y="22" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">OpenMind</text>
  <!-- toolbar buttons -->
  <rect x="86"  y="9" width="58" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="115" y="22" text-anchor="middle" fill="#64748b" font-size="9">+ 子节点 Tab</text>
  <rect x="150" y="9" width="48" height="18" rx="4" fill="rgba(59,130,246,.15)" stroke="rgba(59,130,246,.35)" stroke-width="1"/>
  <text x="174" y="22" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">水平 ●</text>
  <rect x="204" y="9" width="38" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="223" y="22" text-anchor="middle" fill="#64748b" font-size="9">垂直</text>
  <rect x="248" y="9" width="38" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="267" y="22" text-anchor="middle" fill="#64748b" font-size="9">放射</text>
  <rect x="294" y="9" width="52" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="320" y="22" text-anchor="middle" fill="#64748b" font-size="9">适应屏幕</text>
  <rect x="352" y="9" width="38" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="371" y="22" text-anchor="middle" fill="#64748b" font-size="9">撤销</text>

  <!-- divider canvas / sidebar -->
  <line x1="635" y1="36" x2="635" y2="500" stroke="rgba(255,255,255,.07)" stroke-width="1"/>

  <!-- ══ Sidebar ══ -->
  <rect x="635" y="36" width="265" height="464" fill="#060d1a"/>
  <rect x="635" y="36" width="265" height="38" fill="#091626"/>
  <text x="653" y="60" fill="#93c5fd" font-size="12" font-weight="700">✦ AI 助手</text>
  <rect x="860" y="46" width="30" height="18" rx="4" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
  <text x="875" y="59" text-anchor="middle" fill="#475569" font-size="9">设置</text>

  <!-- quick prompts -->
  <rect x="647" y="84" width="58" height="15" rx="4" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <text x="676" y="95" text-anchor="middle" fill="#475569" font-size="8">展开节点</text>
  <rect x="711" y="84" width="58" height="15" rx="4" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <text x="740" y="95" text-anchor="middle" fill="#475569" font-size="8">精简导图</text>
  <rect x="775" y="84" width="58" height="15" rx="4" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <text x="804" y="95" text-anchor="middle" fill="#475569" font-size="8">重组结构</text>

  <!-- chat: user msg -->
  <g class="fade chat1">
    <rect x="647" y="112" width="230" height="42" rx="7"
          fill="rgba(37,99,235,.22)" stroke="rgba(59,130,246,.28)" stroke-width="1"/>
    <text x="657" y="127" fill="#bfdbfe" font-size="9.5">帮我展开「商业模式」，</text>
    <text x="657" y="143" fill="#bfdbfe" font-size="9.5">生成 3 个子主题</text>
  </g>
  <!-- chat: AI reply -->
  <g class="fade chat2">
    <rect x="647" y="162" width="230" height="56" rx="7"
          fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.09)" stroke-width="1"/>
    <text x="657" y="178" fill="#94a3b8" font-size="9.5">已为「商业模式」新增子节点：</text>
    <text x="657" y="193" fill="#10b981" font-size="9.5">✓ 订阅制</text>
    <text x="710" y="193" fill="#10b981" font-size="9.5">✓ 广告变现</text>
    <text x="657" y="208" fill="#10b981" font-size="9.5">✓ 企业授权</text>
  </g>

  <!-- chat input bar -->
  <rect x="647" y="458" width="230" height="28" rx="7"
        fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
  <text x="659" y="476" fill="#334155" font-size="9">输入指令，AI 直接修改导图…</text>
  <rect x="857" y="460" width="22" height="22" rx="5" fill="rgba(37,99,235,.55)"/>
  <text x="868" y="475" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="700">↑</text>

  <!-- ══ MIND MAP (confined to x: 0–635) ══ -->

  <!-- ── Root node (x≈130) ── -->
  <g class="fade s1" filter="url(#glow)">
    <rect x="76" y="216" width="116" height="38" rx="10"
          fill="rgba(37,99,235,.22)" stroke="#2563eb" stroke-width="2"/>
    <text x="134" y="239" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">商业计划</text>
  </g>

  <!-- ── Branch A: 产品  (x≈280) ── -->
  <path class="fade l2a"
        d="M192,235 C236,235 242,148 280,148"
        fill="none" stroke="#3b82f6" stroke-width="2"
        stroke-dasharray="1000" opacity="0.75"/>
  <g class="fade s2a">
    <rect x="280" y="133" width="88" height="30" rx="7"
          fill="rgba(59,130,246,.14)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity=".8"/>
    <text x="324" y="153" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">产品</text>
  </g>
  <!-- collapse dot for 产品 -->
  <g class="fade dot2a">
    <circle cx="373" cy="148" r="6" fill="rgba(59,130,246,.3)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="373" y="152" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="700">−</text>
  </g>

  <!-- ── Branch B: 用户  (x≈280) ── -->
  <path class="fade l2b"
        d="M192,235 C250,235 250,235 280,235"
        fill="none" stroke="#10b981" stroke-width="2"
        stroke-dasharray="1000" opacity="0.75"/>
  <g class="fade s2b">
    <rect x="280" y="220" width="88" height="30" rx="7"
          fill="rgba(16,185,129,.14)" stroke="#10b981" stroke-width="1.5" stroke-opacity=".8"/>
    <text x="324" y="240" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">用户</text>
  </g>
  <!-- collapse dot for 用户 -->
  <g class="fade dot2b">
    <circle cx="373" cy="235" r="6" fill="rgba(16,185,129,.3)" stroke="#10b981" stroke-width="1.5"/>
    <text x="373" y="239" text-anchor="middle" fill="#10b981" font-size="8" font-weight="700">−</text>
  </g>

  <!-- ── Branch C: 商业模式  (x≈280) ── -->
  <path class="fade l2c"
        d="M192,235 C236,235 242,322 280,322"
        fill="none" stroke="#f59e0b" stroke-width="2"
        stroke-dasharray="1000" opacity="0.75"/>
  <g class="fade s2c">
    <rect x="280" y="307" width="88" height="30" rx="7"
          fill="rgba(245,158,11,.14)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity=".8"/>
    <text x="324" y="327" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">商业模式</text>
  </g>
  <!-- collapse dot for 商业模式 -->
  <g class="fade dot2c">
    <circle cx="373" cy="322" r="6" fill="rgba(245,158,11,.3)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="373" y="326" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="700">−</text>
  </g>

  <!-- ── Leaves A  (x≈490) ── -->
  <path class="fade ll3a1"
        d="M373,148 C420,148 430,118 468,118"
        fill="none" stroke="#3b82f6" stroke-width="1.4"
        stroke-dasharray="1000" opacity="0.55"/>
  <g class="fade s3a1">
    <rect x="468" y="105" width="94" height="24" rx="5"
          fill="rgba(59,130,246,.10)" stroke="#3b82f6" stroke-width="1.1" stroke-opacity=".55"/>
    <text x="515" y="121" text-anchor="middle" fill="#93c5fd" font-size="10.5">Web 优先</text>
  </g>

  <path class="fade ll3a2"
        d="M373,148 C420,148 430,178 468,178"
        fill="none" stroke="#3b82f6" stroke-width="1.4"
        stroke-dasharray="1000" opacity="0.55"/>
  <g class="fade s3a2">
    <rect x="468" y="165" width="94" height="24" rx="5"
          fill="rgba(59,130,246,.10)" stroke="#3b82f6" stroke-width="1.1" stroke-opacity=".55"/>
    <text x="515" y="181" text-anchor="middle" fill="#93c5fd" font-size="10.5">AI 生成 UI</text>
  </g>

  <!-- ── Leaves B  (x≈490) ── -->
  <path class="fade ll3b1"
        d="M373,235 C420,235 430,212 468,212"
        fill="none" stroke="#10b981" stroke-width="1.4"
        stroke-dasharray="1000" opacity="0.55"/>
  <g class="fade s3b1">
    <rect x="468" y="199" width="94" height="24" rx="5"
          fill="rgba(16,185,129,.10)" stroke="#10b981" stroke-width="1.1" stroke-opacity=".55"/>
    <text x="515" y="215" text-anchor="middle" fill="#6ee7b7" font-size="10.5">独立开发者</text>
  </g>

  <path class="fade ll3b2"
        d="M373,235 C420,235 430,258 468,258"
        fill="none" stroke="#10b981" stroke-width="1.4"
        stroke-dasharray="1000" opacity="0.55"/>
  <g class="fade s3b2">
    <rect x="468" y="245" width="94" height="24" rx="5"
          fill="rgba(16,185,129,.10)" stroke="#10b981" stroke-width="1.1" stroke-opacity=".55"/>
    <text x="515" y="261" text-anchor="middle" fill="#6ee7b7" font-size="10.5">小型团队</text>
  </g>

  <!-- ── Leaves C (initial 2)  (x≈490) ── -->
  <path class="fade ll3c1"
        d="M373,322 C420,322 430,299 468,299"
        fill="none" stroke="#f59e0b" stroke-width="1.4"
        stroke-dasharray="1000" opacity="0.55"/>
  <g class="fade s3c1">
    <rect x="468" y="286" width="94" height="24" rx="5"
          fill="rgba(245,158,11,.10)" stroke="#f59e0b" stroke-width="1.1" stroke-opacity=".55"/>
    <text x="515" y="302" text-anchor="middle" fill="#fcd34d" font-size="10.5">订阅制</text>
  </g>

  <path class="fade ll3c2"
        d="M373,322 C420,322 430,345 468,345"
        fill="none" stroke="#f59e0b" stroke-width="1.4"
        stroke-dasharray="1000" opacity="0.55"/>
  <g class="fade s3c2">
    <rect x="468" y="332" width="94" height="24" rx="5"
          fill="rgba(245,158,11,.10)" stroke="#f59e0b" stroke-width="1.1" stroke-opacity=".55"/>
    <text x="515" y="348" text-anchor="middle" fill="#fcd34d" font-size="10.5">企业授权</text>
  </g>

  <!-- ── AI-generated leaf C3 &amp; C4  (x≈490) ── -->
  <path class="fade lai1"
        d="M373,322 C420,322 430,385 468,385"
        fill="none" stroke="#f59e0b" stroke-width="1.6"
        stroke-dasharray="1000" opacity="0.75"/>
  <g class="fade ai1" filter="url(#glow)">
    <rect x="468" y="372" width="94" height="24" rx="5"
          fill="rgba(245,158,11,.22)" stroke="#f59e0b" stroke-width="1.8"/>
    <text x="515" y="388" text-anchor="middle" fill="#fde68a" font-size="10.5" font-weight="700">✨ 广告变现</text>
  </g>

  <path class="fade lai2"
        d="M373,322 C420,322 430,425 468,425"
        fill="none" stroke="#f59e0b" stroke-width="1.6"
        stroke-dasharray="1000" opacity="0.75"/>
  <g class="fade ai2" filter="url(#glow)">
    <rect x="468" y="412" width="94" height="24" rx="5"
          fill="rgba(245,158,11,.22)" stroke="#f59e0b" stroke-width="1.8"/>
    <text x="515" y="428" text-anchor="middle" fill="#fde68a" font-size="10.5" font-weight="700">✨ 数据服务</text>
  </g>

  <!-- ── Watermark ── -->
  <text x="317" y="490" text-anchor="middle" fill="rgba(255,255,255,.07)"
        font-size="9" letter-spacing="3">OPENMIND · AI MIND MAP</text>
</svg>
